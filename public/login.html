<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Connexion WasteFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:-apple-system,sans-serif;background:#F2F4F0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:32px;width:360px;max-width:90vw;box-shadow:0 1px 3px rgba(0,0,0,.1)}
h1{font-size:20px;color:#111827;margin:0 0 4px 0}
p{font-size:13px;color:#6b7280;margin:0 0 24px 0}
label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;margin-bottom:16px;outline:none;box-sizing:border-box}
input:focus{border-color:#059669;box-shadow:0 0 0 2px rgba(5,150,105,.2)}
button{width:100%;padding:10px;background:#065f46;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#047857}
.msg{margin-top:16px;text-align:center;font-size:13px;color:#6b7280}
.error{color:#dc2626;font-size:13px;margin-bottom:12px;text-align:center}
</style>
</head>
<body>
<div class="card">
<h1>WasteFlow</h1>
<p>Pilotage DSP — Déchets Solides</p>
<form id="loginForm" onsubmit="return doLogin()">
<div id="errorMsg" class="error" style="display:none"></div>
<label for="e">Email</label>
<input type="email" id="e" placeholder="exemple@organisation.tg" required>
<label for="p">Mot de passe</label>
<input type="password" id="p" placeholder="••••••••" required>
<button id="btn" type="submit">Se connecter</button>
</form>
<div class="msg" id="status"></div>
</div>
<script>
async function doLogin(){
  var btn=document.getElementById('btn'),st=document.getElementById('status'),er=document.getElementById('errorMsg');
  btn.disabled=true;btn.textContent='Connexion…';st.textContent='';er.style.display='none';
  try{
    var r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('e').value,password:document.getElementById('p').value}),credentials:'include'});
    if(!r.ok){
      var d=await r.json();
      er.textContent=d.error==='INVALID_CREDENTIALS'?'Email ou mot de passe incorrect.':d.error||'Erreur '+r.status;
      er.style.display='block';btn.disabled=false;btn.textContent='Se connecter';return false;
    }
    var d=await r.json();
    if(d.csrfToken) document.cookie='wf-csrf='+d.csrfToken+';path=/;max-age=604800;SameSite=Lax';
    st.textContent='✅ Connexion réussie ! Redirection…';
    st.style.color='#059669';
    window.location.href='/dashboard';
  }catch(e){
    er.textContent='Erreur réseau. Vérifiez votre connexion. ('+e.message+')';
    er.style.display='block';btn.disabled=false;btn.textContent='Se connecter';
  }
  return false;
}
</script>
</body>
</html>
