<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Connexion — WasteFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #F2F4F0; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 12px; border: 1px solid #e5e7eb;
            padding: 32px; width: 360px; max-width: 90vw; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    h1 { font-size: 18px; color: #111827; margin-bottom: 6px; }
    p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px;
            font-size: 14px; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #059669; box-shadow: 0 0 0 2px rgba(5,150,105,.2); }
    button { width: 100%; padding: 10px; background: #065f46; color: white; border: none;
             border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #047857; }
    .error { color: #dc2626; font-size: 13px; margin-bottom: 12px; display: none; }
    .info { color: #6b7280; font-size: 12px; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>WasteFlow</h1>
    <p>Pilotage DSP — Déchets Solides</p>
    <form id="loginForm">
      <div class="error" id="errorMsg"></div>
      <label for="email">Email</label>
      <input type="email" id="email" value="katantchaa@gmail.com" required>
      <label for="pwd">Mot de passe</label>
      <input type="password" id="pwd" value="Admin123!" required>
      <button id="loginBtn" onclick="doLogin()">Se connecter</button>
    </form>
    <div class="info" id="status"></div>
  </div>
  <script>
    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const status = document.getElementById('status');
      const error = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'Connexion…';
      status.textContent = '';
      error.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('pwd').value,
          }),
          credentials: 'include',
        });
        if (!res.ok) {
          const data = await res.json();
          error.textContent = data.error === 'INVALID_CREDENTIALS'
            ? 'Email ou mot de passe incorrect.'
            : data.error || 'Erreur de connexion';
          error.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
          return;
        }
        const data = await res.json();
        if (data.csrfToken) document.cookie = 'wf-csrf=' + data.csrfToken + '; path=/; max-age=604800; Secure; SameSite=Lax';
        status.textContent = '✅ Connexion réussie ! Redirection…';
        window.location.href = '/dashboard';
      } catch (e) {
        error.textContent = 'Erreur réseau. Vérifie ta connexion.';
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }
  </script>
</body>
</html>
